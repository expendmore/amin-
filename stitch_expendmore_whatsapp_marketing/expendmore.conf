<VirtualHost *:80>
    ServerAdmin admin@expendmore.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block access to git config, .env files, SQL files, and logging logs
    <FilesMatch "^\.|\.sql$|^\.env|\.log$">
        Require all denied
    </FilesMatch>

    # Block direct directory viewing on configurations folder
    <Directory /var/www/html/auth_core>
        Require all denied
    </Directory>

    # Set Custom logs paths
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
